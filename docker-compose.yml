services:
  mobileax-web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_ID: mobileax
        NEXT_PUBLIC_STORE_ID: ${NEXT_PUBLIC_STORE_ID:-}
        NEXT_PUBLIC_PHONEBASE_API: ${NEXT_PUBLIC_PHONEBASE_API:-https://basestock.ru}
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - /opt/phonebase/.env
    environment:
      NEXT_PUBLIC_SITE_ID: mobileax
      NEXT_PUBLIC_STORE_ID: ${NEXT_PUBLIC_STORE_ID:-}
    restart: unless-stopped
